<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админ-панель</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="admin-header">
    <h1>Админ-панель</h1>
    <a href="/" class="btn-back">Назад</a>
  </div>


  <!-- Таблица пользователей -->
  <table id="users-table" border="1">
    <thead>
      <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Email</th>
        <th>Активирован</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- 🔥 Новый блок для лимита -->
  <h2>Настройка лимита загрузки</h2>
  <label for="limitRange">Лимит (МБ):</label>
  <input type="range" id="limitRange" min="50" max="2000" step="50">
  <span id="limitValue"></span>
  <button id="saveLimit">Сохранить</button>

  <!-- Подключаем отдельный скрипт -->
  <script src="admin.js"></script>
</body>
</html>
